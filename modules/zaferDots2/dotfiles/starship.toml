"$schema" = 'https://starship.rs/config-schema.json'

# =============================================================================
# Starship Configuration - 2 Line Style
# Theme: Kanagawa Dragon
#
# Preview:
# в•ӯв”Җ пҢғ in ~/projects/dots on пҗҳ main
# в•°в”Җ вқҜ
# =============================================================================

format = """
[в•ӯв”Җ](dragon_grey)\
$os\
$directory\
$git_branch\
$git_status\
$c\
$rust\
$golang\
$nodejs\
$php\
$java\
$python\
$docker_context\
$conda\
$line_break\
$character"""

# ------------------------------------------------------------------------------
# Color Palette
# ------------------------------------------------------------------------------
palette = "kanagawa_dragon"

[palettes.kanagawa_dragon]
background = "#181616"
foreground = "#c5c9c5"
dragon_red = "#c4746e"
dragon_green = "#8a9a7b"
dragon_yellow = "#c4b28a"
dragon_blue = "#7fb4ca"
dragon_magenta = "#938aa9"
dragon_cyan = "#7aa89f"
dragon_orange = "#b6927b"
dragon_grey = "#727169"

[palettes.catpuccin_mocha]
background = "#1e1e2e"
foreground = "#cdd6f4"
dragon_red = "#f38ba8"
dragon_green = "#a6e3a1"
dragon_yellow = "#f9e2af"
dragon_blue = "#89b4fa"
dragon_magenta = "#cba6f7"
dragon_cyan = "#94e2d5"
dragon_orange = "#fab387"
dragon_grey = "#585b70"

# ------------------------------------------------------------------------------
# Core UI Elements
# ------------------------------------------------------------------------------

[character]
success_symbol = "[в•°в”Җ](dragon_grey) [вқҜ](bold dragon_green)"
error_symbol = "[в•°в”Җ](dragon_grey) [вқҜ](bold dragon_red)"
vimcmd_symbol = "[в•°в”Җ](dragon_grey) [вқ®](bold dragon_green)"

[line_break]
disabled = false

[directory]
style = "bold dragon_blue"
read_only = " п Ҫ"
truncation_length = 4
truncation_symbol = "вҖҰ/"
format = 'in [$path]($style)[$read_only]($style) '

[os]
disabled = false
style = "dragon_cyan"
format = ' [$symbol]($style)' # Space before symbol for padding

[os.symbols]
Arch = "пҢғ "
Ubuntu = "пҢӣ "
Debian = "пҢҶ "
Fedora = "пҢҠ "
Linux = "п…ј "
Macos = "п…№ "
Windows = "оңҸ "
Manjaro = "пҢ’ "
Gentoo = "ji "
EndeavourOS = "пҢў "
NixOS = "пҢ“ "
Alpine = "пҢҖ "
Amazon = "пү° "
Android = "оңҺ "
Artix = "пҢҹ "
CentOS = "пҢ„ "
FreeBSD = "пҢҢ "
Kali = "пҢ§ "
Mint = "пҢҺ "
OpenBSD = "пҢЁ "
openSUSE = "пҢ” "
Pop = "пҢӘ "
Raspbian = "пҢ• "
Redhat = "пҢ– "
RedHatEnterprise = "пҢ– "
Solus = "пҙұ "
SUSE = "пҢ” "
Void = "пҢ® "
CachyOS = "пҢғ " # Cachy uses Arch icon often, or custom if font supports it

# ------------------------------------------------------------------------------
# Git Integration
# ------------------------------------------------------------------------------

[git_branch]
symbol = "пҗҳ "
style = "bold dragon_magenta"
format = 'in [$symbol$branch]($style) '

[git_status]
style = "dragon_red"
format = '([$all_status$ahead_behind]($style) )'
ahead     = "[вҮЎ${count}](dragon_green) "
behind    = "[вҮЈ${count}](dragon_red) "
modified  = "[вңҺ${count}](dragon_yellow) "
staged    = "[+${count}](dragon_blue) "
untracked = "[?${count}](dragon_cyan) "

# ------------------------------------------------------------------------------
# Language & Tool Versions (Shown only when files exist)
# ------------------------------------------------------------------------------

[c]
symbol = "оҳһ "
style = "dragon_yellow"
format = 'via [$symbol($version )]($style)'

[docker_context]
symbol = "пҢҲ "
style = "dragon_blue"
format = 'via [$symbol$context]($style) '

[golang]
symbol = "оҳ§ "
style = "dragon_blue"
format = 'via [$symbol($version )]($style)'

[java]
symbol = "оү– "
style = "dragon_red"
format = 'via [$symbol($version )]($style)'

[nodejs]
symbol = "оңҳ "
style = "dragon_green"
format = 'via [$symbol($version )]($style)'

[php]
symbol = "оҳҲ "
style = "dragon_blue"
format = 'via [$symbol($version )]($style)'

[python]
symbol = "рҹҗҚ "
style = "dragon_yellow"
format = 'via [$symbol($version )(\($virtualenv\) )]($style)'

[rust]
symbol = "оһЁ "
style = "dragon_red"
format = 'via [$symbol($version )]($style)'

[conda]
symbol = "п„Ң "
style = "dragon_green"
format = 'via [$symbol$environment]($style)'
